<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="stem" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a7f3d0"/>
      <stop offset="100%" stop-color="#6ee7b7"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Subtle inner glow ring -->
  <rect width="64" height="64" rx="14" fill="none" stroke="white" stroke-width="1" stroke-opacity="0.15"/>

  <!-- Leaf shape - main -->
  <path d="M32 10 C20 10 12 22 14 36 C16 48 26 54 32 54 C38 54 48 48 50 36 C52 22 44 10 32 10Z"
        fill="url(#leaf)" fill-opacity="0.22"/>

  <!-- Leaf veins -->
  <path d="M32 14 C32 14 32 52 32 52" stroke="white" stroke-width="1.5" stroke-opacity="0.3" stroke-linecap="round"/>
  <path d="M32 26 C28 22 18 24 16 30" stroke="white" stroke-width="1" stroke-opacity="0.25" stroke-linecap="round" fill="none"/>
  <path d="M32 26 C36 22 46 24 48 30" stroke="white" stroke-width="1" stroke-opacity="0.25" stroke-linecap="round" fill="none"/>
  <path d="M32 36 C28 32 20 33 18 38" stroke="white" stroke-width="1" stroke-opacity="0.2" stroke-linecap="round" fill="none"/>
  <path d="M32 36 C36 32 44 33 46 38" stroke="white" stroke-width="1" stroke-opacity="0.2" stroke-linecap="round" fill="none"/>

  <!-- Bold stylized "A" letter -->
  <path d="M22 46 L32 14 L42 46" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M25.5 37 L38.5 37" stroke="white" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Sparkle top right -->
  <circle cx="49" cy="15" r="1.5" fill="white" fill-opacity="0.8"/>
  <path d="M49 11 L49 13 M49 17 L49 19 M45 15 L47 15 M51 15 L53 15" stroke="white" stroke-width="1.2" stroke-linecap="round" stroke-opacity="0.7"/>

  <!-- Small dot accent -->
  <circle cx="32" cy="50" r="2" fill="white" fill-opacity="0.5"/>
</svg>
